<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#050507"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#FF1744"/>
      <stop offset="60%" stop-color="#DC143C"/>
      <stop offset="100%" stop-color="#990023"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" ry="112" fill="url(#bg)"/>
  <!-- stylised W — two interlocking chevrons -->
  <g filter="url(#glow)" stroke="url(#accent)" stroke-width="46" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <path d="M96 168 L176 360 L232 232"/>
    <path d="M280 232 L336 360 L416 168"/>
  </g>
  <!-- subtle hanger dot -->
  <circle cx="256" cy="140" r="14" fill="url(#accent)" opacity="0.9"/>
</svg>
