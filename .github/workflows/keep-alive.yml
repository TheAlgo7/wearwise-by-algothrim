name: Supabase Keep-Alive

# Runs every 4 days — well within Supabase's 7-day inactivity pause window.
# Makes a lightweight read against the DB so Supabase registers activity.
# This runs on GitHub's servers — no PC, no app open, no manual action needed.

on:
  schedule:
    - cron: '0 8 */4 * *'   # Every 4 days at 08:00 UTC
  workflow_dispatch:          # Also allow manual trigger from GitHub Actions tab

jobs:
  ping:
    name: Ping Supabase DB
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Query Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          echo "Pinging WearWise Supabase at $(date -u)"

          HTTP_STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            "${SUPABASE_URL}/rest/v1/categories?select=id&limit=1" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Authorization: Bearer ${SUPABASE_ANON_KEY}")

          echo "HTTP status: $HTTP_STATUS"
          echo "Response: $(cat /tmp/response.json)"

          if [ "$HTTP_STATUS" -ge 200 ] && [ "$HTTP_STATUS" -lt 300 ]; then
            echo "✓ Supabase is alive and responding."
          else
            echo "✗ Unexpected status $HTTP_STATUS — investigate."
            exit 1
          fi
